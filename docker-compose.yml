services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: opendc_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./monitoring/mqtt/config:/mosquitto/config
      - ./monitoring/mqtt/data:/mosquitto/data
      - ./monitoring/mqtt/log:/mosquitto/log

  influxdb:
    image: influxdb:2.7
    container_name: opendc_influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123456
      DOCKER_INFLUXDB_INIT_ORG: stellarix
      DOCKER_INFLUXDB_INIT_BUCKET: datacenter
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: stellarix-token

  grafana:
    image: grafana/grafana-oss:latest
    container_name: opendc_grafana
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123456
    depends_on:
      - influxdb

  nodered:
    image: nodered/node-red:latest
    container_name: opendc_nodered
    ports:
      - "1880:1880"
    depends_on:
      - mosquitto
      - influxdb

  postgres:
    image: postgres:16
    container_name: opendc_postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: stellarix
      POSTGRES_PASSWORD: stellarix123
      POSTGRES_DB: opendc_monitor

volumes:
  influxdb_data:
  grafana_data:
  postgres_data:
